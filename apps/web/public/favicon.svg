<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#22c55e" stroke-opacity="0.25" stroke-width="1"/>
  <text x="16" y="24.5" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="#22c55e" filter="url(#glow)">$</text>
  <text x="16" y="24.5" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="#4ade80" opacity="0.6">$</text>
</svg>
